{% extends "layout/base.html" %}

{% block title %}Edit Medicine{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Edit Medicine</h2>
    <form method="POST">
        <div class="form-group">
            <label>Medicine Name *</label>
            <input type="text" name="name" value="{{ medicine.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" value="{{ medicine.category or '' }}">
        </div>
        
        <div class="form-group">
            <label>Batch Number</label>
            <input type="text" name="batch_no" value="{{ medicine.batch_no or '' }}">
        </div>
        
        <div class="form-group">
            <label>Expiry Date</label>
            <input type="date" name="expiry_date" value="{{ medicine.expiry_date or '' }}">
        </div>
        
        <div class="form-group">
            <label>Quantity *</label>
            <input type="number" name="quantity" value="{{ medicine.quantity }}" required>
        </div>
        
        <div class="form-group">
            <label>Purchase Price *</label>
            <input type="number" step="0.01" name="purchase_price" value="{{ medicine.purchase_price }}" required>
        </div>
        
        <div class="form-group">
            <label>Selling Price *</label>
            <input type="number" step="0.01" name="selling_price" value="{{ medicine.selling_price }}" required>
        </div>
        
        <div class="form-group">
            <label>Supplier</label>
            <select name="supplier_id">
                <option value="">Select Supplier</option>
                {% for supplier in suppliers %}
                <option value="{{ supplier.id }}" {% if medicine.supplier_id == supplier.id %}selected{% endif %}>
                    {{ supplier.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Reorder Level</label>
            <input type="number" name="reorder_level" value="{{ medicine.reorder_level }}">
        </div>
        
        <button type="submit" class="btn btn-success">Update Medicine</button>
        <a href="{{ url_for('medicine_bp.medicine_list') }}" class="btn btn-primary">Cancel</a>
    </form>
</div>
{% endblock %}
